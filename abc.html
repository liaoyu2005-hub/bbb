<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MindAR Example</title>

<!-- A-Frame -->
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

a-scene {
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
}

/* AR 文字卡片 */
#custom-text {
  display: none;

  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);

  width: 82%;
  max-width: 380px;

  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(6px);

  color: white;

  padding: 16px 20px;

  border-radius: 18px;

  font-size: 15px;
  line-height: 1.8;
  letter-spacing: 0.5px;

  z-index: 9999;

  white-space: pre-line;

  box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);

  font-family: "Noto Sans TC", "PingFang TC", sans-serif;
}
</style>
</head>

<body>

<!-- AR 文字 -->
<div id="custom-text">
白頭翁最大的特徵，就是頭上有白色羽毛，看起來像戴著白色帽子。

牠們喜歡停在樹枝上唱歌，叫聲相當響亮，在住宅區與校園中都很常見。

白頭翁喜歡吃水果、花蜜與小昆蟲，是台灣常見的都市鳥類之一。
</div>

<!-- AR Scene -->
<a-scene
  mindar-image="
    imageTargetSrc: https://liaoyu2005-hub.github.io/bbb/targets.mind;
    autoStart: true;
    uiLoading: yes;
    uiScanning: yes;
    uiError: yes;
  "
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <!-- camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- target -->
  <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

</a-scene>

<script>
window.addEventListener("load", () => {

  const targetEl = document.querySelector("#target");
  const customDiv = document.querySelector("#custom-text");

  targetEl.addEventListener("targetFound", () => {
    customDiv.style.display = "block";
    console.log("TARGET FOUND");
  });

  targetEl.addEventListener("targetLost", () => {
    customDiv.style.display = "none";
    console.log("TARGET LOST");
  });

});
</script>

</body>
</html>
